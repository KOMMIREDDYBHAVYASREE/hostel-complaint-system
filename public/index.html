<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hostel Complaint System | VIT-AP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="https://vitap.ac.in/assets/images/logos/vitapnewlogo.png">
    <h1>Hostel Complaint Management System</h1>
</header>

<main class="center">
    <section class="card">
       <h2>Login</h2>

<p style="font-size:14px; color:#555; margin-bottom:10px;">
    <strong>Student:</strong> Use your registration number as username.<br>
    <strong>Admin:</strong> Username is <strong>admin</strong>.
</p>

        <form id="loginForm">
            <input type="text" id="regNumber" placeholder="Registration Number" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login / Register</button>
        </form>
    </section>
</main>

<footer>© VIT-AP University</footer>

<script src="script.js"></script>
</body>
</html>
